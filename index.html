<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas — Sakal Muebles y Decoración</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--cream:#F8F5F0;--dark:#1A1410;--brown:#3D2B1F;--gold:#C4956A;--muted:#8A7A6A;--border:#E0D8CE;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;}
.shell{display:grid;grid-template-columns:300px 1fr;min-height:100vh;}
.sidebar{background:var(--brown);padding:28px 20px;display:flex;flex-direction:column;gap:20px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px;}
.sb-logo{text-align:center;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.1);}
.sb-logo img{height:44px;object-fit:contain;filter:brightness(0) invert(1);opacity:0.9;}
.sb-logo-fb{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);letter-spacing:0.08em;}
.sec{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:8px;}
.inp{width:100%;padding:8px 12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#fff;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:300;outline:none;transition:border-color 0.2s;}
.inp::placeholder{color:rgba(255,255,255,0.3);}.inp:focus{border-color:var(--gold);}
.sw{position:relative;}.sw .inp{padding-left:32px;}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);font-size:13px;pointer-events:none;}
.pl{flex:1;display:flex;flex-direction:column;gap:5px;overflow-y:auto;min-height:0;}
.pl::-webkit-scrollbar{width:3px;}.pl::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px;}
.pi{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:all 0.15s;border:1px solid transparent;}
.pi:hover{background:rgba(255,255,255,0.06);}.pi.active{background:rgba(196,149,106,0.15);border-color:rgba(196,149,106,0.3);}
.pi img{width:38px;height:38px;object-fit:cover;border-radius:5px;background:rgba(255,255,255,0.1);flex-shrink:0;}
.pi-name{font-size:11px;font-weight:300;color:rgba(255,255,255,0.8);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ld{display:flex;gap:4px;justify-content:center;padding:16px 0;}
.ld span{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:bnc 1s infinite;}
.ld span:nth-child(2){animation-delay:0.15s;}.ld span:nth-child(3){animation-delay:0.3s;}
@keyframes bnc{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.main{display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--brown);letter-spacing:0.04em;}
.tr{display:flex;gap:10px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border:none;transition:all 0.15s;}
.btn-o{background:transparent;color:var(--brown);border:1px solid var(--border);}.btn-o:hover{border-color:var(--brown);}
.badge{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:300;letter-spacing:0.06em;}
.bd{background:#FEF3C7;color:#92400E;}.bl{background:#D1FAE5;color:#065F46;}
.vbar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 28px;background:#fff;border-bottom:1px solid var(--border);align-items:center;}
.vlb{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
.vp{padding:5px 14px;border-radius:20px;border:1px solid var(--border);font-size:10px;font-weight:300;cursor:pointer;transition:all 0.15s;background:#fff;color:var(--dark);}
.vp:hover{border-color:var(--gold);}.vp.active{background:var(--brown);border-color:var(--brown);color:var(--gold);}
.content{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;background:var(--cream);overflow-y:auto;}
.es{text-align:center;color:var(--muted);}
.es-icon{font-size:48px;opacity:0.2;margin-bottom:16px;}
.es-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--brown);margin-bottom:8px;}
.es-text{font-size:12px;font-weight:300;line-height:1.8;}
.ficha{width:680px;height:880px;background:#fff;position:relative;box-shadow:0 24px 64px rgba(0,0,0,0.14);overflow:hidden;display:flex;flex-direction:column;flex-shrink:0;}
.mosaic{display:grid;grid-template-columns:58% 42%;grid-template-rows:50% 50%;height:72%;gap:3px;background:#e0d8ce;flex-shrink:0;}
.pm{grid-row:1/3;overflow:hidden;}.ps{overflow:hidden;}
.pm img,.ps img{width:100%;height:100%;object-fit:cover;display:block;}
.pp{width:100%;height:100%;background:#E8E0D0;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:0.3;}
.finfo{height:28%;padding:14px 28px 14px;display:flex;flex-direction:column;justify-content:space-between;background:#fff;position:relative;}
.frule{position:absolute;top:0;left:28px;right:28px;height:1px;background:var(--gold);opacity:0.45;}
.ftr{display:flex;align-items:flex-start;justify-content:space-between;}
.fvendor{font-size:8px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);font-weight:400;margin-bottom:5px;}
.fname{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;line-height:1.05;color:var(--dark);}
.fvar{font-size:9px;font-weight:300;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:6px;}
.fdots{display:flex;gap:4px;align-items:center;margin-top:4px;}
.fdot{width:5px;height:5px;border-radius:50%;background:var(--gold);}
.fbr{display:flex;align-items:flex-end;justify-content:space-between;}
height:70px;object-fit:contain;opacity:1;
.flogo-t{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:400;color:var(--brown);letter-spacing:0.14em;text-transform:uppercase;opacity:0.65;}
.fcontact{text-align:right;font-size:8px;font-weight:300;color:var(--muted);letter-spacing:0.1em;line-height:1.8;text-transform:uppercase;}
.ctr{position:absolute;top:12px;right:12px;width:32px;height:32px;z-index:2;border-top:1px solid rgba(255,255,255,0.55);border-right:1px solid rgba(255,255,255,0.55);pointer-events:none;}
.cbl{position:absolute;bottom:14px;left:28px;width:22px;height:22px;z-index:2;border-bottom:1px solid rgba(196,149,106,0.4);border-left:1px solid rgba(196,149,106,0.4);pointer-events:none;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:#fff;padding:10px 20px;border-radius:6px;font-size:11px;letter-spacing:0.06em;transition:transform 0.3s;z-index:500;pointer-events:none;font-family:'Montserrat',sans-serif;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="shell">
<div class="sidebar">
  <div class="sb-logo">
    <img src="logo sakal.png" onerror="this.style.display='none';document.getElementById('lgfb').style.display='block'">
    <div id="lgfb" style="display:none;" class="sb-logo-fb">Sakal Muebles y Decoración</div>
  </div>
  <div>
    <div class="sec">Shopify</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <input class="inp" type="text" id="sh-store" value="macramexico.myshopify.com">
      <div style="display:flex;gap:6px;">
        <input class="inp" type="text" id="sh-token" placeholder="Token Storefront API" style="flex:1;">
        <button onclick="connectShopify()" style="padding:8px 12px;background:var(--gold);border:none;border-radius:6px;cursor:pointer;font-size:14px;color:#fff;">↻</button>
      </div>
      <div style="text-align:center;"><span class="badge bd" id="conn-badge">● Demo</span></div>
    </div>
  </div>
  <div>
    <div class="sec">Buscar</div>
    <div class="sw"><span class="si">⌕</span><input class="inp" type="text" placeholder="Nombre del producto..." oninput="filterProds(this.value)"></div>
  </div>
  <div style="flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;">
    <div class="sec">Catálogo (<span id="pc">0</span>)</div>
    <div id="ld" class="ld" style="display:none;"><span></span><span></span><span></span></div>
    <div class="pl" id="pl"></div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Generador de Fichas</div>
    <div class="tr">
      <span class="badge bd" id="badge-top">● Demo</span>
      <button class="btn btn-o" id="export-btn" style="display:none;" onclick="exportPDF()">↓ Descargar PDF</button>
    </div>
  </div>
  <div id="vbar" class="vbar" style="display:none;">
    <span class="vlb">Variante:</span>
    <div id="vpills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div class="content" id="mc">
    <div class="es">
      <div class="es-icon">🛋</div>
      <div class="es-title">Selecciona un producto</div>
      <div class="es-text">Elige un artículo del catálogo para generar<br>su ficha de lujo con mosaico de imágenes</div>
    </div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
let allP=[],prods=[],curP=null,curV=null;

function init(){
  document.getElementById('sh-store').value='macramexico.myshopify.com';
  document.getElementById('sh-token').value='ed5a6e0de155a2e7425099cabfb12492';
  setTimeout(()=>connectShopify(),500);
}

async function connectShopify(){
  const store=document.getElementById('sh-store').value.trim();
  const token=document.getElementById('sh-token').value.trim();
  if(!token){showToast('Ingresa el token');return;}
  document.getElementById('ld').style.display='flex';
  document.getElementById('pl').innerHTML='';

  const fetchPage=async(cursor)=>{
    const after=cursor?`, after: "${cursor}"` :'';
    const q=`{ products(first:50${after}){
      pageInfo{hasNextPage endCursor}
      edges{node{id title vendor description
        images(first:3){edges{node{url}}}
        variants(first:10){edges{node{title}}}
      }}
    }}`;
    const r=await fetch(`https://${store}/api/2024-01/graphql.json`,{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Shopify-Storefront-Access-Token':token},
      body:JSON.stringify({query:q})
    });
    const d=await r.json();
    if(d.errors) throw new Error(d.errors[0].message);
    return d.data.products;
  };

  try{
    let all=[],cursor=null,hasNext=true;
    while(hasNext){
      const page=await fetchPage(cursor);
      all=all.concat(page.edges.map(e=>({
        id:e.node.id, title:e.node.title, description:e.node.description||'', vendor:e.node.vendor||'Sakal',
        images:e.node.images.edges.map(i=>i.node.url),
        variants:e.node.variants.edges.map(v=>({name:v.node.title}))
      })));
      hasNext=page.pageInfo.hasNextPage;
      cursor=page.pageInfo.endCursor;
    }
    allP=all;prods=all;
    renderList(prods);
    localStorage.setItem('ficha-token',token);
    ['conn-badge','badge-top'].forEach(id=>{
      document.getElementById(id).textContent='● Shopify conectado';
      document.getElementById(id).className='badge bl';
    });
    showToast('✓ '+all.length+' productos cargados');
  }catch(e){showToast('Error: '+e.message);}
  finally{document.getElementById('ld').style.display='none';document.getElementById('pc').textContent=allP.length;}
}

function renderList(list){
  document.getElementById('pc').textContent=list.length;
  document.getElementById('pl').innerHTML=list.map(p=>`
    <div class="pi ${curP&&curP.id===p.id?'active':''}" onclick="selectProd('${p.id}')">
      <img src="${p.images[0]?'https://images.weserv.nl/?url='+encodeURIComponent(p.images[0])+'&w=76&h=76&fit=cover':''}" onerror="this.style.background='rgba(255,255,255,0.1)';this.src=''">
      <div class="pi-name">${p.title}</div>
    </div>
  `).join('');
}

function filterProds(q){
  prods=q?allP.filter(p=>p.title.toLowerCase().includes(q.toLowerCase())):allP;
  renderList(prods);
}

function selectProd(id){
  curP=allP.find(p=>p.id===id);
  if(!curP)return;
  curV=curP.variants[0]?.name||'';
  renderVariants();renderFicha();renderList(prods);
  document.getElementById('export-btn').style.display='';
}

function renderVariants(){
  const bar=document.getElementById('vbar');
  const pills=document.getElementById('vpills');
  if(!curP||curP.variants.length<=1||curP.variants[0]?.name==='Default Title'){bar.style.display='none';return;}
  bar.style.display='flex';
  pills.innerHTML=curP.variants.map(v=>`
    <div class="vp ${v.name===curV?'active':''}" onclick="selVariant('${v.name}')">${v.name}</div>
  `).join('');
}

function selVariant(name){curV=name;renderVariants();renderFicha();}

function iSrc(url,w,h){return 'https://images.weserv.nl/?url='+encodeURIComponent(url)+'&w='+w+'&h='+h+'&fit=cover&output=jpg';}

function mkPhoto(url,w,h,cls){
  return url
    ? `<div class="${cls}"><img src="${iSrc(url,w,h)}" alt="" crossorigin="anonymous"></div>`
    : `<div class="${cls}"><div class="pp">🛋</div></div>`;
}

function renderFicha(){
  if(!curP)return;
  const imgs=curP.images;
  const i1=imgs[0]||'', i2=imgs[1]||imgs[0]||'', i3=imgs[2]||imgs[1]||imgs[0]||'';
  const vt=curV&&curV!=='Default Title'?curV:'';

  document.getElementById('mc').innerHTML=`
    <div style="padding:32px;display:flex;justify-content:center;align-items:flex-start;">
      <div class="ficha" id="ficha-card">
        <div class="mosaic">
          ${mkPhoto(i1,800,1400,'pm')}
          ${mkPhoto(i2,600,700,'ps')}
          ${mkPhoto(i3,600,700,'ps')}
        </div>
        <div class="ctr"></div>
        <div class="finfo">
          <div class="frule"></div>
          <div class="ftr">
            <div>
              <div class="fvendor">${'Sakal Muebles y Decoración'}</div>
              <div class="fname">${curP.title}</div>
              ${vt?`<div class="fvar">${vt}</div>`:''}
              ${curP.description?`<div style="font-size:9px;font-weight:300;color:var(--muted);line-height:1.6;margin-top:6px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${curP.description}</div>`:''}
            </div>
            <div class="fdots">${imgs.slice(0,3).map(()=>'<div class="fdot"></div>').join('')}</div>
          </div>
          <div class="fbr">
            <div class="flogo">
              <img src="logo sakal.png" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
              <div style="display:none;" class="flogo-t">Sakal</div>
            </div>
            <div class="fcontact">Mérida, Yucatán<br>sakalhome.com</div>
          </div>
        </div>
        <div class="cbl"></div>
      </div>
    </div>
  `;
}

async function exportPDF(){
  if(!curP){showToast('Selecciona un producto primero');return;}
  showToast('Generando ficha...');
  const el=document.getElementById('ficha-card');
  if(!el)return;
  try{
    const canvas=await html2canvas(el,{scale:2,useCORS:true,allowTaint:false,backgroundColor:'#ffffff',width:680,height:880});
    const imgData=canvas.toDataURL('image/jpeg',0.95);
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
    pdf.addImage(imgData,'JPEG',0,0,pdf.internal.pageSize.getWidth(),pdf.internal.pageSize.getHeight());
    const v=curV&&curV!=='Default Title'?'-'+curV.replace(/\s+/g,'-'):'';
    pdf.save('Ficha-'+curP.title.replace(/\s+/g,'-')+v+'.pdf');
    showToast('✓ Ficha descargada');
  }catch(err){showToast('Error: '+err.message);}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

init();
</script>
</body>
</html>
